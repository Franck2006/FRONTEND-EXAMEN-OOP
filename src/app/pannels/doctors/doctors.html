<div
  class="h-[85vh] slider-from-down pb-20 custom-scroll overflow-y-auto snap-y snap-proximity flex flex-col gap-6"
>
  <div class="snap-start capitalize">
    <p class="text-3xl">mes rendez-vous</p>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    @if (isLoadingDoctors()) {
      <div class="w-full" *ngFor="let preloader of [0, 0, 0]">
        <app-common-preloader />
      </div>
    } @else {
      <div
        class="bg-slate-800 h-120 border border-gray-500 rounded-2xl overflow-hidden snap-start"
        *ngFor="let doctor of doctors()"
      >
        <div class="w-full h-[45%]">
          <img
            src="https://i.pinimg.com/1200x/3e/f3/50/3ef350dc86cc82a092463e5d795654b5.jpg"
            alt=""
            class="w-full h-full"
          />
        </div>
        <div class="p-4 first-letter:uppercase space-y-4">
          <div>
            <p class="first-letter:uppercase">doctor</p>
            <p class="capitalize text-slate-300 italic font-medium">
              {{ doctor.name }} {{ doctor.lastname }}
            </p>
          </div>
          <div>
            <p class="first-letter:uppercase">temps</p>
            <p class="capitalize text-slate-300 italic font-medium">franck amani</p>
          </div>
          <div>
            <p class="first-letter:uppercase">heure</p>
            <p class="capitalize text-slate-300 italic font-medium">franck amani</p>
          </div>
          <div class="flex flex-col gap-2 md:flex-row md:justify-between">
            <button
              class="bg-blue-600 active:bg-blue-600 hover:bg-blue-700 transition-all rounded-full py-2 px-4"
              (click)="openMessageModel(true, doctor.doctor)"
            >
              rendez-vous
            </button>

            <button
              class="bg-green-600/25 active:bg-green-600/25 hover:bg-green-700/25 text-green-500 transition-all rounded-full py-2 px-4"
              (click)="openMessageModel(true, doctor.doctor)"
            >
              rendez-vous
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>

@if (modelStatus()) {
  <div>
    <app-message />
  </div>
}
