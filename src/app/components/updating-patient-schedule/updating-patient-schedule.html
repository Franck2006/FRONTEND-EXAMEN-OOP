<form
  (click)="$event.stopPropagation()"
  [formGroup]="availabilityForm"
  class="snap-start"
  (ngSubmit)="onNewAppointmentSubmit()"
>
  <div class="border bg-slate-800 border-gray-500 rounded-2xl p-6 flex flex-col gap-4 text-white">
    <div class="flex items-center gap-2 mb-2">
      <div class="bg-green-800/80 p-1 rounded-full">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
          />
        </svg>
      </div>
      <h1 class="text-xl font-semibold">Ajouter une disponibilité</h1>
    </div>

    @if (choosen_patient()) {
      <div
        class="w-full border gap-8 md:gap-0 border-gray-500 p-2 rounded-2xl md:rounded-full flex flex-col md:flex-row md:justify-between items-center"
      >
        <div class="flex gap-2">
          <div
            class="w-10 h-10 rounded-full border-gray-500 border-2 border-dotted overflow-hidden"
          >
            @if (true) {
              <div
                class="text-md font-bold text-slate-400 h-full w-full flex items-center justify-center bg-slate-900"
              >
                <p class="uppercase">
                  <!-- Franck Amani
                      {{ choosen_patient()?.name?.slice(0, 1) }}
                      {{ choosen_patient()?.lastname?.slice(0, 1) }} -->
                </p>
              </div>
            } @else {
              <img
                src="https://i.pinimg.com/1200x/3e/f3/50/3ef350dc86cc82a092463e5d795654b5.jpg"
                alt=""
                class="w-full h-full"
              />
            }
          </div>
          <div>
            <p class="font-bold">
              Franck Amani
              <!-- {{ choosen_patient()?.name }}
                  {{ choosen_patient()?.lastname }} -->
            </p>
            <p class="italic text-slate-200">
              number
              <!-- {{ choosen_patient()?.phone }} -->
            </p>
          </div>
        </div>
      </div>
    }

    <!-- Date -->
    <div>
      <label class="block text-sm font-medium mb-1">Sélectionner la date</label>
      <div class="border rounded-md p-2 bg-slate-700 transition-colors">
        <input
          type="date"
          formControlName="available_date"
          required
          class="w-full bg-transparent outline-none text-white appearance-none"
        />
      </div>
    </div>

    <!-- Times -->
    <div class="flex flex-col md:flex-row gap-4">
      <div class="flex-1">
        <label class="block text-sm font-medium mb-1">Heure début</label>
        <div class="border border-gray-500 rounded-md bg-slate-700">
          <input
            type="time"
            formControlName="start_time"
            required
            class="w-full p-2 bg-transparent outline-none text-white"
          />
        </div>
      </div>
      <div class="flex-1">
        <label class="block text-sm font-medium mb-1">Heure fin</label>
        <div class="border border-gray-500 rounded-md bg-slate-700">
          <input
            type="time"
            formControlName="end_time"
            required
            class="w-full p-2 bg-transparent outline-none text-white"
          />
        </div>
      </div>
    </div>

    <div class="mt-4">
      @if (isSubmittingNewAppoint()) {
        <button
          type="button"
          class="bg-slate-600 self-center transition-all text-gray-400 font-bold w-full cursor-not-allowed py-3 rounded-full shadow-lg"
        >
          creating appointment
        </button>
      } @else {
        <button
          type="submit"
          [disabled]="availabilityForm.invalid"
          class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-600 disabled:text-gray-400 disabled:cursor-not-allowed transition-all text-white font-bold w-full py-3 rounded-full shadow-lg"
        >
          update
        </button>
      }
    </div>
  </div>
</form>
