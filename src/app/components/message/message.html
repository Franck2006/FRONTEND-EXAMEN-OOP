<div
  (click)="dismissMessageModel(false)"
  class="bg-black/60 slider-from-down transition-all backdrop-blur-sm fixed inset-0 flex items-center justify-center space-y-3"
>
  <div action="" class="bg-slate-900 p-4 relative rounded-2xl" (click)="$event.stopPropagation()">
    <button class="absolute right-2 top-2" type="button" (click)="dismissMessageModel(false)">
      &times;
    </button>
    <div>
      <div class="flex gap-2">
        <div class="w-16 h-16 rounded-full border-gray-500 border-2 border-dotted overflow-hidden">
          @if (true) {
            <div
              class="text-2xl font-bold text-slate-400 h-full w-full flex items-center justify-center bg-slate-900"
            >
              <p>FA</p>
            </div>
          } @else {
            <img
              src="https://i.pinimg.com/1200x/3e/f3/50/3ef350dc86cc82a092463e5d795654b5.jpg"
              alt=""
              class="w-full h-full"
            />
          }
        </div>
        <div>
          <p class="font-bold">Franck Amani</p>
        </div>
      </div>
      <form
        action=""
        [formGroup]="message"
        (ngSubmit)="sendMessageDoctor(modelStatusDataStoreDoctor()?.id)"
        class="bg-slate-900 p-4 relative rounded-2xl w-[90vw] md:w-120 space-y-4"
      >
        <div class="mt-4">
          <p>descriprion</p>
          <div class="w-full border border-gray-500 px-2 rounded-md py-1">
            <textarea
              placeholder="message"
              class="w-full h-full border-0 outline-0"
              formControlName="message"
            ></textarea>
          </div>
          <!--  -->
        </div>
        <div class="w-full">
          <button
            class="w-full bg-blue-600 text-white py-2 rounded-2xl hover:bg-blue-700 active:bg-blue-600 transition-all"
          >
            envoyer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
